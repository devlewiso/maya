[build]
  command = "npm run build"
  publish = ".next"

  [build.environment]
    # NEXT_PUBLIC_* variables are public by design in Next.js
    # Exclude them from secret scanning to avoid false positives
    SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
